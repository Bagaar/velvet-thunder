name: CI

on:
  push:
    branches:
      - main
  pull_request: {}

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: "Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7.0.0
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 10.34.5
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.18.0
          cache: pnpm
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Tests
        run: pnpm test
  
  lint:
    name: "Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7.0.0
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 10.34.5
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.18.0
          cache: pnpm
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint

  floating:
    name: "Floating Dependencies"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7.0.0
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 10.34.5
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.18.0
          cache: pnpm
      - name: Install Dependencies
        run: pnpm install --no-lockfile
      - name: Run Tests
        run: pnpm test

  try-scenarios:
    name: ${{ matrix.try-scenario }}
    runs-on: ubuntu-latest
    needs: 'test'
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        try-scenario:
          - glimmer-v1
          - glimmer-v2
          - ember-lts-5.4
          - ember-lts-5.8
          - ember-lts-5.12
          - ember-lts-6.4
          - ember-lts-6.8
          - ember-lts-6.12
          - ember-release
          - ember-beta
          - ember-canary
          - embroider-safe
          - embroider-optimized
          - tailwind-v3
          - tailwind-v4

    steps:
      - uses: actions/checkout@v7.0.0
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 10.34.5
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.18.0
          cache: pnpm
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Tests
        run: ./node_modules/.bin/ember try:one ${{ matrix.try-scenario }} --skip-cleanup
        working-directory: test-app

  deploy-website-tailwind:
    name: "Deploy Website (Tailwind ${{ matrix.tailwind }})"
    runs-on: ubuntu-latest
    needs: 'test'
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include:
          - tailwind: v3
          - tailwind: v4
            tailwind-packages: "tailwindcss@^4 @tailwindcss/cli@^4"
            build-script: build:v4

    steps:
      - uses: actions/checkout@v7.0.0
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 10.34.5
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.18.0
          cache: pnpm
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      - name: Upgrade to Tailwind ${{ matrix.tailwind }}
        if: matrix.tailwind-packages != ''
        run: pnpm add --filter website ${{ matrix.tailwind-packages }}
      - name: Build Website
        run: pnpm --filter website ${{ matrix.build-script || 'build' }}
      - name: Deploy to Netlify (draft)
        uses: nwtgck/actions-netlify@v3.0.0
        with:
          publish-dir: website/dist
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Tailwind ${{ matrix.tailwind }} — ${{ github.sha }}"
          overwrites-pull-request-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
