name: Design System Sync

on:
  # Run manually from the Actions tab
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump (patch, minor, major)'
        required: true
        default: 'minor'
        type: choice
        options:
          - patch
          - minor
          - major

  # Or trigger automatically via repository_dispatch from the Figma plugin
  repository_dispatch:
    types: [design-sync]

concurrency:
  group: design-sync
  cancel-in-progress: true

jobs:
  sync:
    name: 'Design System Sync'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write       # create branch + commit files
      pull-requests: write  # open PR

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Run Design Sync
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
          FIGMA_FILE_KEY: vDNdAOWNVJb1SXCR6q52nj
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_BUMP: ${{ github.event.inputs.version || github.event.client_payload.version || 'minor' }}
        run: node .github/scripts/design-sync.mjs
